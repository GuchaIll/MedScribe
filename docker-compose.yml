services:
  web:
    build: ./server
    ports:
      - "3001:8001"
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8001", "--reload"]
    volumes:
      - ./server:/app                                        # Sync code for live reloading
      - ./storage/huggingface_cache:/root/.cache/huggingface # Cache for Huggingface models
      - ./storage:/app/storage                               # Shared storage
    environment:
      - LLM_MODEL=api
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/medscribe
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - HF_TOKEN=${HUGGINGFACE_API_KEY}
      - HUGGINGFACEHUB_API_TOKEN=${HUGGINGFACE_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_started
  
  db:
    image: pgvector/pgvector:pg15 # PostgreSQL 15 with pgvector extension
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=medscribe
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data # Persist data

volumes:
  db-data: # Define named volume for data persistence
