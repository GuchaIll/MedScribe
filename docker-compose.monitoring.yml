# MedScribe — Monitoring Stack (docker-compose overlay)
#
# Extends the main docker-compose.yml with Prometheus, Grafana, and exporters.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up
#
# Access:
#   Prometheus  — http://localhost:9090
#   Grafana     — http://localhost:3100 (admin / admin)

services:

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      gateway:
        condition: service_started

  grafana:
    image: grafana/grafana:11.6.0
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3100:3000"
    depends_on:
      - prometheus

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    command:
      - "--kafka.server=kafka:9092"
      - "--group.filter=medscribe-.*"
      - "--topic.filter=pipeline\\..*|audio\\..*|transcript\\..*"
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  prometheus_data:
  grafana_data:
