<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="225" x2="800" y2="225" stroke="#1e293b" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="#1e293b" stroke-width="1"/>

  <!-- Top label bar -->
  <rect width="800" height="52" fill="#1e293b"/>
  <circle cx="28" cy="26" r="7" fill="#ef4444"/>
  <circle cx="52" cy="26" r="7" fill="#eab308"/>
  <circle cx="76" cy="26" r="7" fill="#22c55e"/>
  <text x="400" y="33" font-family="ui-monospace, monospace" font-size="13" fill="#94a3b8" text-anchor="middle">MedScribe — OCR Document Intelligence</text>

  <!-- Center play circle -->
  <circle cx="400" cy="237" r="64" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <circle cx="400" cy="237" r="58" fill="#1e293b"/>
  <!-- Play triangle -->
  <polygon points="388,217 388,257 428,237" fill="#38bdf8"/>

  <!-- Title text -->
  <text x="400" y="336" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9" text-anchor="middle">OCR Pipeline Demo</text>
